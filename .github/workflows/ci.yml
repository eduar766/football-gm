name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build workspace packages first (engine + contracts)
      - run: pnpm build

      - run: pnpm typecheck
      - run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true
